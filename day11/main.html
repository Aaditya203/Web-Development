<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <form id ="LoginForm" action="/action_page.php">
        First Name: <input type="text" name="fname"><br>
        Last Name: <input type="text" name="lname"><br>
        <input type="submit" value="Submit">

    </form>
    <p>Click the try it button to display the number of elements in form</p>
    <button onclick="myFunction()">Try it</button>
    <p id="displayPlace"></p>
    <script>
        function myFunction(){
            var x = document.getElementById('LoginForm').elements.length;
            var y = document.getElementById("LoginForm").elements[0].value;
            document.getElementById("displayPlace").innerHTML = "Found "+x+" elements in the form."+"First name enetered is "+y;

            const para = document.createElement("p");
            para.innerText = "This is demo text!!";
            document.body.appendChild(para);
        }
    </script>
</body>
</html>
