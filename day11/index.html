<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <h3>Calculate Sum</h3>
    <input id="first" type="text" placeholder="First Number"><br>
    <input id="second" type="text" placeholder="Second Number"><br>
    <button onclick="sum()">Submit</button>
    <p id="demo"></p>
    <script>
        function sum(){
            var x = document.getElementById('first').value
            var y = document.getElementById('second').value
            document.getElementById('demo').innerHTML = "The sum is "+ (parseInt(x)+parseInt(y))
        }
    </script>
</body>
</html>
